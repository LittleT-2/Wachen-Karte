<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Wachen Datenbank</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map { height: 900px; }
body { font-family: Arial; }
</style>
</head>

<body>

<h2>Wachenkarte</h2>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([48.7380, 9.3271], 10);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
 attribution: '© OpenStreetMap'
}).addTo(map);

var marker = L.marker([50.1109, 8.6821]).addTo(map);
marker.bindPopup("Feuerwache Frankfurt");

</script>

</body>
</html>
