<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Wachen Datenbank</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>  <!--Diese Zeile lädt die Leaflet-JavaScript-Bibliothek, damit du interaktive Karten in deiner Webseite nutzen kannst.-->

<style>
#map { height: 900px; }
body { font-family: Arial; }
select { margin-right: 10px; padding: 3px; }
</style>
</head>

<body>

<h2>Wachenkarte</h2>

<select id="typFilter">
<option value="alle">Alle Typen</option>
<option value="NEF">Notarzt</option>
<option value="RTW">Rettungswagen</option>
<option value="KTW">Krankentransport</option>
</select>

<select id="SchichtFilter">
<option value="alle">Alle Schichten</option>
</select>

 
<div id="map"></div> <!--ist der Bereich, in dem Leaflet später die interaktive Karte rendert.-->

<script>
var map = L.map('map').setView([48.7380, 9.3271], 10);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
 attribution: '© OpenStreetMap'
}).addTo(map);

var markerLayer = L.layerGroup().addTo(map);
    
var daten = [
    {name:"Rotkreuz Esslingen 1", typ:"NEF", coords:[48.738003375489406, 9.327123573608125]},
    {name:"Johannes Esslingen 16", typ:"RTW", coords:[48.70776689159191, 9.142443257120622]},
    {name:"Rotkreuz Esslingen 1", typ:"RTW", coords:[48.78873622140468, 9.193569581828257]}
];

function updateMap(typFilter) {
    markerLayer.clearLayers();
    daten.forEach(function(eintrag) {
        if(typFilter === "alle" || eintrag.typ === typFilter) {
            L.marker(eintrag.coords)
             .bindPopup("<b>"+eintrag.name+"</b><br>"+eintrag.typ)
             .addTo(markerLayer);
        }
    });
}

document.getElementById("filter").addEventListener("change", function() {
    updateMap(this.value);
});

updateMap("alle");

 
</script>

</body>
</html>
