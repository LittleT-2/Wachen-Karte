<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>RD-Übersicht</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/> 

<style>
#map { height: 950px; }
body { font-family: Arial; }
select { margin-right: 10px; padding: 3px; margin-bottom: 10px; }

.leaflet-bottom.leaflet-left .legend {
    background: white;
    padding: 6px 8px;
    font-size: 14px;
    line-height: 18px;
    color: #333;
    border-radius: 5px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
}
.legend i {
    width: 18px;
    height: 18px;
    float: left;
    margin-right: 8px;
    opacity: 0.9;
}
</style>
</head>

<body>

<h2>Wachenkarte</h2>

<label for="typFilter">Typ:</label>
<select id="typFilter">
  <option value="all">Alle</option>
</select>

<label for="schichtFilter">Schicht:</label>
<select id="schichtFilter">
  <option value="all">Alle</option>
</select>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script> 

<script>
var map = L.map('map').setView([48.7290, 9.3271], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

var markers = [];
var wachenData = [];
var typFilter = document.getElementById('typFilter');
var schichtFilter = document.getElementById('schichtFilter');

function createIcon(color){
    return new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-'+color+'.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/images/marker-shadow.png',
        iconSize: [25,41],
        iconAnchor: [12,41],
        popupAnchor: [1,-34],
        shadowSize: [41,41]
    });
}

Papa.parse("daten.csv", {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results){
        wachenData = results.data;

        let typen = [...new Set(wachenData.map(w=>w.typ))];
        let schichten = [...new Set(wachenData.map(w=>w.Schicht))];

        typen.forEach(t=>{ let o=document.createElement('option'); o.value=t; o.text=t; typFilter.add(o); });
        schichten.forEach(s=>{ let o=document.createElement('option'); o.value=s; o.text=s; schichtFilter.add(o); });

        updateMarkers();
    }
});

function updateMarkers(){
    markers.forEach(m=>map.removeLayer(m));
    markers=[];

    let selectedTyp = typFilter.value;
    let selectedSchicht = schichtFilter.value;

    // Gruppieren nach Standort
    let grouped = {};
    wachenData.forEach(w=>{
        if((selectedTyp==='all'||w.typ===selectedTyp) && (selectedSchicht==='all'||w.Schicht===selectedSchicht)){
            let key=w.lat+","+w.lng;
            if(!grouped[key]) grouped[key]=[];
            grouped[key].push(w);
        }
    });

    for(let key in grouped){
        let latlng = key.split(',').map(Number);
        let vehicles = grouped[key];

        // Dominanter Typ für Farbe
        let color = vehicles.find(v=>v.typ==="NEF") ? 'red' : vehicles.find(v=>v.typ==="RTW") ? 'blue' : 'grey';
        let icon = createIcon(color);

        let popupContent = vehicles.map(v=>v.typ+" Schicht "+v.Schicht+" ("+v.Anz+"x)").join("<br>");
        popupContent = "<b>"+vehicles[0].name+"</b><br>"+popupContent;

        let marker = L.marker(latlng, {icon: icon}).bindPopup(popupContent);
        marker.addTo(map);
        markers.push(marker);
    }
}

typFilter.addEventListener('change', updateMarkers);
schichtFilter.addEventListener('change', updateMarkers);

// Legende
var legend = L.control({position:'bottomleft'});
legend.onAdd = function(map){
    let div = L.DomUtil.create('div','legend');
    div.innerHTML += '<i style="background:red"></i> NEF<br>';
    div.innerHTML += '<i style="background:blue"></i> RTW<br>';
    return div;
};
legend.addTo(map);
</script>
</body>
</html>
