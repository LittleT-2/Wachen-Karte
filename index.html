<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>RD-Übersicht</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/> 

<style>
#map { height: 950px; }
body { font-family: Arial; }
select { margin-right: 10px; padding: 3px; margin-bottom: 10px; }

/* Legende */
.leaflet-bottom.leaflet-left .legend {
    background: white;
    padding: 6px 8px;
    font-size: 14px;
    line-height: 18px;
    color: #333;
    border-radius: 5px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
}
.legend i {
    width: 18px;
    height: 18px;
    float: left;
    margin-right: 8px;
    opacity: 0.9;
}
</style>
</head>

<body>

<h2>Wachenkarte</h2>

<!-- Filter Dropdowns -->
<label for="typFilter">Typ:</label>
<select id="typFilter">
  <option value="all">Alle</option>
</select>

<label for="schichtFilter">Schicht:</label>
<select id="schichtFilter">
  <option value="all">Alle</option>
</select>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<!-- PapaParse JS -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script> 

<script>
var map = L.map('map').setView([48.7290, 9.3271], 12);

// OpenStreetMap Layer
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

var markers = []; // Marker Array
var wachenData = []; // CSV Daten

var typFilter = document.getElementById('typFilter');
var schichtFilter = document.getElementById('schichtFilter');

// Farbtöne für NEF (Rot) und RTW (Blau) nach Schicht
function getColor(typ, schicht) {
    if(typ === "NEF") {
        if(schicht === "xx") return 'red';
        if(schicht === "12") return '#ff6666';
        if(schicht === "24") return '#990000';
        return '#cc0000';
    }
    if(typ === "RTW") {
        if(schicht === "xx") return 'blue';
        if(schicht === "12") return '#66ccff';
        if(schicht === "24") return '#003399';
        return '#0066cc';
    }
    return 'gray'; // sonst
}

// Funktion für Marker-Icons mit beliebiger Farbe
function createColoredIcon(color) {
    return new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-'+color+'.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
    });
}

// CSV einlesen
Papa.parse("daten.csv", {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
        wachenData = results.data;

        // Dropdowns füllen
        var typen = [...new Set(wachenData.map(w => w.typ))];
        var schichten = [...new Set(wachenData.map(w => w.Schicht))];

        typen.forEach(function(t){
            var option = document.createElement('option');
            option.value = t;
            option.text = t;
            typFilter.add(option);
        });

        schichten.forEach(function(s){
            var option = document.createElement('option');
            option.value = s;
            option.text = s;
            schichtFilter.add(option);
        });

        updateMarkers();
    }
});

// Marker aktualisieren
function updateMarkers() {
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    var selectedTyp = typFilter.value;
    var selectedSchicht = schichtFilter.value;

    wachenData.forEach(function(wache){
        if ((selectedTyp === 'all' || wache.typ === selectedTyp) &&
            (selectedSchicht === 'all' || wache.Schicht === selectedSchicht)) {

            var lat = parseFloat(wache.lat);
            var lng = parseFloat(wache.lng);

            var color = getColor(wache.typ, wache.Schicht);
            var icon = createColoredIcon(color === 'red' ? 'red' : color === 'blue' ? 'blue' : 'grey');

            var marker = L.marker([lat, lng], {icon: icon})
                .bindPopup("<b>"+wache.name+"</b><br>Typ: "+wache.typ+"<br>Schicht: "+wache.Schicht);

            marker.addTo(map);
            markers.push(marker);
        }
    });
}

typFilter.addEventListener('change', updateMarkers);
schichtFilter.addEventListener('change', updateMarkers);

// Legende hinzufügen
var legend = L.control({position: 'bottomleft'});
legend.onAdd = function(map) {
    var div = L.DomUtil.create('div', 'legend');
    div.innerHTML += '<i style="background: red"></i> NEF xx / sonst<br>';
    div.innerHTML += '<i style="background: #ff6666"></i> NEF Schicht 12<br>';
    div.innerHTML += '<i style="background: #990000"></i> NEF Schicht 24<br>';
    div.innerHTML += '<i style="background: blue"></i> RTW xx / sonst<br>';
    div.innerHTML += '<i style="background: #66ccff"></i> RTW Schicht 12<br>';
    div.innerHTML += '<i style="background: #003399"></i> RTW Schicht 24<br>';
    return div;
};
legend.addTo(map);

</script>

</body>
</html>
