<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Wachen Datenbank</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>  <!--Diese Zeile lädt die Leaflet-JavaScript-Bibliothek, damit du interaktive Karten in deiner Webseite nutzen kannst.-->

<style>
#map { height: 900px; }
body { font-family: Arial; }
select { margin-right: 10px; padding: 3px; }
</style>
</head>

<body>

<h2>Wachenkarte</h2>
<div id="map"></div> <!--ist der Bereich, in dem Leaflet später die interaktive Karte rendert.-->

<script>
var map = L.map('map').setView([48.7380, 9.3271], 10);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
 attribution: '© OpenStreetMap'
}).addTo(map);

var marker = L.marker([48.788, 9.1935]).addTo(map);
marker.bindPopup("Feuerwache xxx");

</script>

</body>
</html>
