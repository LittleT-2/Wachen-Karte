<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>RD-Übersicht</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/> <!-- Leaflet CSS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script> <!-- Leaflet JS -->
    
<style>
#map { height: 950px; }
body { font-family: Arial; }
select { margin-right: 10px; padding: 3px; }
</style>
</head>

<body>

<h2>Wachenkarte</h2>

<div id="map"></div>
    
<script>

//Karte erstellen
var map = L.map('map').setView([48.7080, 9.3271], 12);

// OpenStreetMap Layer
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);


// var markerLayer = L.layerGroup().addTo(map);

// Standorte
var daten = [
    {name:"Rotkreuz Esslingen 1", typ:"NEF", coords:[48.7380, 9.3271]},
    {name:"Johannes Esslingen 16", typ:"RTW", coords:[48.7077, 9.14244]},
    {name:"Rotkreuz Esslingen 1", typ:"RTW", coords:[48.7887, 9.1935]}
];
// markerLayer.clearLayers();

// Marker setzen
daten.forEach(function(eintrag) {
  L.marker(eintrag.coords)
    .addTo(map);
    .bindPopup("<b>" + eintrag.name + "</b>");
});

    
</script>

</body>
</html>
