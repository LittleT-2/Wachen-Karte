<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>RD-Übersicht</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/> <!-- Leaflet CSS -->

<style>
#map { height: 950px; }
body { font-family: Arial; }
select { margin-right: 10px; padding: 3px; }
</style>
</head>

<body>

<h2>Wachenkarte</h2>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script> <!-- Leaflet JS -->
    
<script>

//Karte erstellen
var map = L.map('map').setView([48.7380, 9.3271], 12);

// OpenStreetMap Layer
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

// Standorte
var daten = [
   {name:"Rotkreuz Esslingen 1", typ:"RTW", Schicht:"24", coords:[48.7368,9.3277]},
   {name:"Johannes Esslingen 16", typ:"RTW", Schicht:"24",coords:[48.7077,9.1423]},
   {name:"Rotkreuz Esslingen 4", typ:"NEF", Schicht:"24", coords:[48.6239,9.3414]},
   {name:"Rotkreuz Esslingen 5", typ:"RTW", Schicht:"12", coords:[48.6506,9.4359]},
   {name:"Rotkreuz Stuttgart1", typ:"RTW", Schicht:"24", coords:[48.7887, 9.1935]}
];

// Marker setzen
daten.forEach(function(eintrag) {
L.marker(eintrag.coords)
    .addTo(map)
    .bindPopup("<b>" + eintrag.name + "</b>");
});


</script>

</body>
</html>

</body>
</html>
