<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>RD-Übersicht</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/> <!-- Leaflet CSS -->

<style>
#map { height: 950px; }
body { font-family: Arial; }
select { margin-right: 10px; padding: 3px; }
</style>
</head>

<body>

<h2>Wachenkarte</h2>

<!-- Filter-UI -->
<label>Typ:</label>
<select id="typFilter">
  <option value="alle">Alle</option>
  <option value="RTW">RTW</option>
  <option value="NEF">NEF</option>
</select>

<label>Schicht:</label>
<select id="schichtFilter">
  <option value="alle">Alle</option>
  <option value="24">24h</option>
  <option value="12">12h</option>
</select>
<!-- Ende Filter-UI -->
    
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script> <!-- Leaflet JS -->
    
<script>

//Karte erstellen
var map = L.map('map').setView([48.7280, 9.3271], 12);

// OpenStreetMap Layer
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

// Daten
var daten = [
   {name:"Rotkreuz Esslingen 1", typ:"RTW", Schicht:"24", coords:[48.7368,9.3277]},
   {name:"Johannes Esslingen 16", typ:"RTW", Schicht:"24",coords:[48.7077,9.1423]},
   {name:"Rotkreuz Esslingen 4", typ:"NEF", Schicht:"24", coords:[48.6239,9.3414]},
   {name:"Rotkreuz Esslingen 5", typ:"RTW", Schicht:"12", coords:[48.6506,9.4359]},
   {name:"Rotkreuz Stuttgart 1", typ:"RTW", Schicht:"24", coords:[48.7887, 9.1935]}
];

// Marker speichern
var markerListe = [];

// Marker erstellen
daten.forEach(function(eintrag) {
    var marker = L.marker(eintrag.coords)
        .bindPopup("<b>" + eintrag.name + "</b>");

    marker.eintrag = eintrag;
    marker.addTo(map);
    markerListe.push(marker);
});

// Filterfunktion
function filterAnwenden() {
    var typ = document.getElementById("typFilter").value;
    var schicht = document.getElementById("schichtFilter").value;

    markerListe.forEach(function(marker) {
        var eintrag = marker.eintrag;

        var typMatch = (typ === "alle" || eintrag.typ === typ);
        var schichtMatch = (schicht === "alle" || eintrag.Schicht === schicht);

        if (typMatch && schichtMatch) {
            map.addLayer(marker);
        } else {
            map.removeLayer(marker);
        }
    });
}

// Event Listener
document.getElementById("typFilter").addEventListener("change", filterAnwenden);
document.getElementById("schichtFilter").addEventListener("change", filterAnwenden);

</script>

</body>
</html>

</body>
</html>
