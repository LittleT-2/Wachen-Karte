<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>RD-Übersicht</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/> 

<style>
#map { height: 950px; }
body { font-family: Arial; }
select { margin-right: 10px; padding: 3px; }
</style>
</head>

<body>

<h2>Wachenkarte</h2>

<div id="map"></div>

 <!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- PapaParse JS -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script> 
    
<script>

//Karte erstellen
var map = L.map('map').setView([48.7280, 9.3271], 12);

// OpenStreetMap Layer
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

// CSV einlesen
Papa.parse("daten.csv", {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {

        results.data.forEach(function(wache){

            var lat = parseFloat(wache.lat);
            var lng = parseFloat(wache.lng);

            L.marker([lat, lng])
             .addTo(map)
             .bindPopup(
                "<b>"+wache.name+"</b><br>" +
                "Typ: "+wache.typ
             );

        });

    }
});


</script>

</body>
</html>
