<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>RD-Übersicht</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/> 

<style>
#map { height: 950px; }
body { font-family: Arial; }
select { margin-right: 10px; padding: 3px; margin-bottom: 10px; }

/* Legende */
.leaflet-bottom.leaflet-left .legend {
    background: white;
    padding: 6px 8px;
    font-size: 14px;
    line-height: 18px;
    color: #333;
    border-radius: 5px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
}
.legend i {
    width: 18px;
    height: 18px;
    float: left;
    margin-right: 8px;
    opacity: 0.9;
}
</style>
</head>

<body>

<h2>Wachenkarte</h2>

<!-- Filter Dropdowns -->
<label for="typFilter">Typ:</label>
<select id="typFilter">
  <option value="all">Alle</option>
</select>

<label for="schichtFilter">Schicht:</label>
<select id="schichtFilter">
  <option value="all">Alle</option>
</select>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- PapaParse JS -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script> 

<script>
var map = L.map('map').setView([48.7290, 9.3271], 12);

// OpenStreetMap Layer
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

var markers = []; // Array für Marker
var wachenData = []; // CSV Daten

var typFilter = document.getElementById('typFilter');
var schichtFilter = document.getElementById('schichtFilter');

// Leaflet Icons für NEF (rot) und RTW (blau)
var redIcon = new L.Icon({
    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/images/marker-shadow.png',
    iconSize: [25, 41],
    iconAnchor: [12, 41],
    popupAnchor: [1, -34],
    shadowSize: [41, 41]
});

var blueIcon = new L.Icon({
    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',
    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/images/marker-shadow.png',
    iconSize: [25, 41],
    iconAnchor: [12, 41],
    popupAnchor: [1, -34],
    shadowSize: [41, 41]
});

// CSV einlesen
Papa.parse("daten.csv", {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
        wachenData = results.data;

        // Einzigartige Werte für Filter extrahieren
        var typen = [...new Set(wachenData.map(w => w.typ))];
        var schichten = [...new Set(wachenData.map(w => w.Schicht))];

        // Filter Dropdowns füllen
        typen.forEach(function(t){
            var option = document.createElement('option');
            option.value = t;
            option.text = t;
            typFilter.add(option);
        });

        schichten.forEach(function(s){
            var option = document.createElement('option');
            option.value = s;
            option.text = s;
            schichtFilter.add(option);
        });

        updateMarkers();
    }
});

// Marker aktualisieren
function updateMarkers() {
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    var selectedTyp = typFilter.value;
    var selectedSchicht = schichtFilter.value;

    wachenData.forEach(function(wache){
        if ((selectedTyp === 'all' || wache.typ === selectedTyp) &&
            (selectedSchicht === 'all' || wache.Schicht === selectedSchicht)) {

            var lat = parseFloat(wache.lat);
            var lng = parseFloat(wache.lng);

            // Icon wählen
            var icon = wache.typ === "NEF" ? redIcon : (wache.typ === "RTW" ? blueIcon : undefined);

            var marker = L.marker([lat, lng], icon ? {icon: icon} : {})
                .bindPopup("<b>"+wache.name+"</b><br>Typ: "+wache.typ+"<br>Schicht: "+wache.Schicht);

            marker.addTo(map);
            markers.push(marker);
        }
    });
}

// Event Listener für Filter
typFilter.addEventListener('change', updateMarkers);
schichtFilter.addEventListener('change', updateMarkers);

// Legende hinzufügen
var legend = L.control({position: 'bottomleft'});

legend.onAdd = function(map) {
    var div = L.DomUtil.create('div', 'legend');
    div.innerHTML += '<i style="background: red"></i> NEF<br>';
    div.innerHTML += '<i style="background: blue"></i> RTW<br>';
    return div;
};

legend.addTo(map);

</script>

</body>
</html>
